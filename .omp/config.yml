  - ./.omp/extensions/daaf-output-scanner.ts
  - ./.omp/extensions/daaf-context-reporter.ts
  - ./.omp/extensions/daaf-remind-orchestrator.ts
  - ./.omp/extensions/daaf-archive-session.ts
